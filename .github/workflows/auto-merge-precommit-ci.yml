---
name: Auto-merge pre-commit-ci hook upgrades
on:
  pull_request_target:
    types: [opened, synchronize]
  # Capture manual human approvals in real-time.
  pull_request_review:
    types: [submitted]

# Cancel the previous approval/merge signaling run on a new commit pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  signal-intent:
    name: Approve and signal GH for pre-commit-ci auto-merge
    runs-on: ubuntu-latest
    if: |
      github.actor == 'pre-commit-ci[bot]' &&
      startsWith(github.head_ref, 'pre-commit-ci')

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Audit PR approval state
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |

          # Fetch all active reviews
          REVIEWS=$(gh pr view "$PR_URL" --json reviews --jq '.reviews')
          # Check for ANY "APPROVED" state (Human or Bot)
          HAS_APPROVAL=$(echo "$REVIEWS" | jq 'any(.[]; .state == "APPROVED")')
          # Check specifically if the Actions Bot has approved (to avoid double-commenting)
          BOT_APPROVED=$(echo "$REVIEWS" | jq 'any(.[]; .author.login == "github-actions" and .state == "APPROVED")')

          echo "has_any_approval=$HAS_APPROVAL" >> $GITHUB_OUTPUT
          echo "bot_already_approved=$BOT_APPROVED" >> $GITHUB_OUTPUT

      - name: Review and approve PR (bot fallback)
        if: steps.check.outputs.has_any_approval != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SHA: ${{ steps.check.outputs.head_sha }}
        run: |
          gh pr review "$PR_URL" \
            --approve \
            --body "Auto reviewed and approved pre-commit-ci hook upgrades at SHA \`$SHA\`. \
                    Standard safety checks apply."

      - name: Enable rebase auto-merge
        if: |
          steps.check.outputs.has_any_approval == 'true' ||
          steps.check.outputs.bot_already_approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # The merge is queued and handled by GitHub's backend state machine.
          gh pr merge "$PR_URL" --auto --rebase
