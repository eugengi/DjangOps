---
name: build
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - test_utils/**
      - .github/actions/**
      - .github/workflows/**
      - requirements/base.txt
      - requirements/ci.txt
      - requirements/prod.txt
      - requirements/test-ci.txt
      - requirements/uv.txt
  pull_request:
    branches:
      - "**"

jobs:
  changes:
    name: Change detection
    runs-on: ubuntu-latest
    outputs:
      run-build: ${{ steps.detect-changes.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect relevant file changes
        id: detect-changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              '- src/**'
              '- tests/**'
              '- test_utils/**'
              '- .github/actions/**'
              '- .github/workflows/**'
              '- requirements/base.txt'
              '- requirements/ci.txt'
              '- requirements/prod.txt'
              '- requirements/test-ci.txt'
              '- requirements/uv.txt'

  build:
    name: Build environments
    needs: changes
    if: needs.changes.outputs.run-build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
        django-version:
          - django42
          - django50

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1  # Full history not required for build step.

      - name: Set up Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.django-version }}

      - name: Restore tox environment cache
        uses: ./.github/actions/cache-tox-env
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Prepare tox build environment
        run: |
          tox run -e ${{ matrix.django-version }} --notest -vvv
        shell: bash

  build-status:
    name: Build environment status
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        run: |
          CHANGES_RESULT="${{ needs.changes.result }}"
          BUILD_RESULT="${{ needs.build.result }}"
          RUN_BUILD="${{ needs.changes.outputs.run-build }}"

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Changes job failed. Cannot determine if build was required."
            exit 1
          fi

          if [[ "$RUN_BUILD" == "true" && "$BUILD_RESULT" != "success" ]]; then
            echo "Build was required but did not succeed (result: $BUILD_RESULT)."
            exit 1
          fi

          # Changes for relevant paths didn't match, so we expect a skip.
          echo "Build passed or was intentionally skipped (run-build=$RUN_BUILD, result=$BUILD_RESULT)."
          exit 0
