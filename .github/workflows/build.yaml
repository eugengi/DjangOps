---
name: build
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - test_utils/**
      - .github/actions/**
      - .github/workflows/**
      - pyproject.toml
      - uv.lock
  pull_request:
    branches:
      - "**"

jobs:
  # ----------------------------------------------------------------------------
  # Chore(pre-job): Detect whether any build-relevant paths were modified.
  # Produces `should-run` ── whether a build is needed, consumed below.
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Change detection
    uses: ./.github/workflows/_detect-changes.yaml
    with:
      path-filters: |
        code:
          - src/**
          - tests/**
          - test_utils/**
          - .github/actions/**
          - .github/workflows/**
          - pyproject.toml
          - uv.lock

  # ----------------------------------------------------------------------------
  # Core: Build across Python × Django versions matrix.
  # ----------------------------------------------------------------------------
  build:
    name: Build environments
    needs: detect-changes
    if: needs.detect-changes.outputs.should-run == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
        django-version:
          - django42
          - django50

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1  # Full history not required for build step.

      - name: Set up Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.django-version }}

      - name: Restore tox environment cache
        uses: ./.github/actions/cache-tox-env
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Prepare tox build environment
        run: |
          tox run -e ${{ matrix.django-version }} --notest -vvv
        shell: bash

  # ----------------------------------------------------------------------------
  # Chore(post-job): Check and surface job status for branch-protection rules.
  # Always runs ── signal whether the core job ran, was skipped, or failed.
  # ----------------------------------------------------------------------------
  check-status:
    name: Check build status
    needs: [detect-changes, build]
    if: always()
    uses: ./.github/workflows/_check-status.yaml
    with:
      gatekeeper-result: ${{ needs.detect-changes.result }}
      job-result: ${{ needs.build.result }}
      should-run: ${{ needs.detect-changes.outputs.should-run }}
