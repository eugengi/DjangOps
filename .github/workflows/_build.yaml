---
# Reusable worker workflow — Build
#
# Prepares tox environment for the target Python and Django version.
# Intended to be called exclusively from ci.yaml; do not add triggers here.
#
# The caller (ci.yaml) owns change detection and status surfacing.
# This workflow owns only the build matrix and its steps.
#
# [!] Matrix sync: the Python and Django version defined here MUST remain identical
# to the one in _test.yaml. If you add or remove a version here, update
# _test.yaml in the same commit.
#

name: build
on:
  workflow_call:
    inputs:
      should-run:
        description: >
          The `should-run` output from the detect-changes call in the
          orchestrator workflow (ci.yaml).  When 'false', all jobs in
          this workflow are skipped.
        type: string
        required: true

jobs:
  build:
    name: Build environments
    if: inputs.should-run == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        python-version:
          - "3.12"
        django-version:
          - django52

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1  # Full history not required for the build step.

      - name: Set up Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.django-version }}

      - name: Restore tox environment cache
        uses: ./.github/actions/cache-tox-env
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Prepare tox build environment
        run: tox run -e ${{ matrix.django-version }} --notest -vvv
        shell: bash
