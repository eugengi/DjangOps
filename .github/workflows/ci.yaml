---
name: ci
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - test_utils/**
      - .github/actions/**
      - .github/workflows/**
      - pyproject.toml
      - uv.lock
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ----------------------------------------------------------------------------
  # Chore(pre-job): Detect whether any build-relevant paths were modified.
  # Produces `should-run` ── consumed by both the build and test phases.
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Change detection
    uses: ./.github/workflows/_detect-changes.yaml
    with:
      path-filters: |
        code:
          - src/**
          - tests/**
          - test_utils/**
          - .github/actions/**
          - .github/workflows/**
          - pyproject.toml
          - uv.lock

  # ----------------------------------------------------------------------------
  # Core (phase 1): Build tox environments across Python × Django matrix.
  # [!] Skipped when `detect-changes` reports no relevant modifications.
  # ----------------------------------------------------------------------------
  build:
    name: Build environments
    needs: detect-changes
    if: needs.detect-changes.outputs.should-run == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
        django-version:
          - django42
          - django50

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1  # Full history not required for build step.

      - name: Set up Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.django-version }}

      - name: Restore tox environment cache
        uses: ./.github/actions/cache-tox-env
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Prepare tox build environment
        run: |
          tox run -e ${{ matrix.django-version }} --notest -vvv
        shell: bash

  # ----------------------------------------------------------------------------
  # Chore (post-job, phase 1): Surface build status for branch-protection.
  # Always runs — signals pass/skip/fail regardless of build outcome.
  # ----------------------------------------------------------------------------
  check-status-build:
    name: Check build status
    needs: [detect-changes, build]
    if: always()
    uses: ./.github/workflows/_check-status.yaml
    with:
      gatekeeper-result: ${{ needs.detect-changes.result }}
      job-result: ${{ needs.build.result }}
      should-run: ${{ needs.detect-changes.outputs.should-run }}

  # --------------------------------------------------------------------------
  # Core (phase 2): Run test suite across the same Python × Django matrix.
  # [!] Skipped when `detect-changes` reports no relevant modifications, or
  #     the build phase did not succeed.
  # --------------------------------------------------------------------------
  test:
      name: Run test suite
      needs: [detect-changes, build]
      if: needs.detect-changes.outputs.should-run == 'true'
      timeout-minutes: 10
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os:
            - ubuntu-24.04
          python-version:
            - "3.10"
            - "3.11"
            - "3.12"
          django-version:
            - django42
            - django50

      services:
        postgres:
          image: postgres:18.3-alpine3.23@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
          ports:
            - 5432:5432
          options: >-
            --health-cmd="pg_isready -U postgres"
            --health-interval=2s
            --health-timeout=5s
            --health-retries=5
          env:
            POSTGRES_DB: ${{ secrets.DB_NAME }}
            POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
            POSTGRES_USER: ${{ secrets.DB_USER }}

      steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            fetch-depth: 1  # Full history not required for test step.

        - name: Set up Python CI
          uses: ./.github/actions/setup-python-ci
          with:
            python-version: ${{ matrix.python-version }}
            cache-suffix: ${{ matrix.django-version }}

        - name: Restore tox environment cache
          uses: ./.github/actions/cache-tox-env
          with:
            python-version: ${{ matrix.python-version }}
            django-version: ${{ matrix.django-version }}

        - name: Run Tests
          env:
            # explicitly tell `tox` which environment to execute on this runner.
            TOXENV: ${{ matrix.django-version }}

            # env variables.
            ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
            DB_ENGINE: ${{ vars.DB_ENGINE }}
            DB_HOST: ${{ vars.DB_HOST }}
            DB_PORT: ${{ vars.DB_PORT }}
            DEBUG: ${{ vars.DEBUG }}
            ENVIRONMENT: ${{ vars.ENVIRONMENT }}
            # secrets variable.
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_USER: ${{ secrets.DB_USER }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}

          # Run tox in offline mode (bypass venv creation and installation).
          run: tox run --skip-env-install --skip-missing-interpreters false -vvv
          shell: bash

  # ----------------------------------------------------------------------------
  # Chore (post-job, phase 1): Surface build status for branch-protection.
  # Always runs — signals pass/skip/fail regardless of build outcome.
  # ----------------------------------------------------------------------------
  check-status-test:
    name: Check test status
    needs: [detect-changes, build, test]
    if: always()
    uses: ./.github/workflows/_check-status.yaml
    with:
      gatekeeper-result: ${{ needs.detect-changes.result }}
      job-result: ${{ needs.test.result }}
      should-run: ${{ needs.detect-changes.outputs.should-run }}
