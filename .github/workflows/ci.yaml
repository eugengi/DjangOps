---
# CI orchestrator — build → test pipeline
#
# This is the sole entry point for CI.
# It owns:
#   - triggers and concurrency
#   - permissions
#   - change detection (pre-job)
#   - sequential wiring between worker phases
#   - status surfacing for branch-protection (post-job, one per phase)
#
# This file never duplicates logic delegated to its reusable workflows.
#
# Note: post-jobs always run — signals pass/skip/fail regardless of worker
# outcome — and report to branch protection.
#

name: ci
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - test_utils/**
      - .github/actions/**
      - .github/workflows/**
      - pyproject.toml
      - uv.lock
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ----------------------------------------------------------------------------
  # Chore(pre-job): Detect whether any build-relevant paths were modified.
  # Produces `should-run` ── consumed by both the build and test phases.
  # ----------------------------------------------------------------------------
  detect-changes:
    name: Change detection
    uses: ./.github/workflows/_detect-changes.yaml
    with:
      path-filters: |
        code:
          - src/**
          - tests/**
          - test_utils/**
          - .github/actions/**
          - .github/workflows/**
          - pyproject.toml
          - uv.lock

  # ----------------------------------------------------------------------------
  # Core (phase 1): Build tox environments.
  # Delegates all build logic to worker (_build.yaml).
  # ----------------------------------------------------------------------------
  build-workflow:
    name: Build
    needs: detect-changes
    uses: ./.github/workflows/_build.yaml
    with:
      should-run: ${{ needs.detect-changes.outputs.should-run }}

  # ----------------------------------------------------------------------------
  # Chore (post-job, phase 1): Surface build status for branch-protection.
  # ----------------------------------------------------------------------------
  check-status-build:
    name: Check build status
    needs: [detect-changes, build-workflow]
    if: always()
    uses: ./.github/workflows/_check-status.yaml
    with:
      gatekeeper-result: ${{ needs.detect-changes.result }}
      job-result: ${{ needs.build-workflow.result }}
      should-run: ${{ needs.detect-changes.outputs.should-run }}

  # --------------------------------------------------------------------------
  # Core (phase 2): Run test suite.
  # Delegates all test logic to worker (_test.yaml).
  # --------------------------------------------------------------------------

  test-workflow:
    name: Test
    needs: [detect-changes, build-workflow]
    uses: ./.github/workflows/_test.yaml
    with:
      should-run: ${{ needs.detect-changes.outputs.should-run }}
    secrets: inherit

  # ----------------------------------------------------------------------------
  # Chore (post-job, phase 2): Surface test status for branch-protection.
  # ----------------------------------------------------------------------------
  check-status-test:
    name: Check test status
    needs: [detect-changes, build-workflow, test-workflow]
    if: always()
    uses: ./.github/workflows/_check-status.yaml
    with:
      gatekeeper-result: ${{ needs.detect-changes.result }}
      job-result: ${{ needs.test-workflow.result }}
      should-run: ${{ needs.detect-changes.outputs.should-run }}
