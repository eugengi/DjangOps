---
  name: tests
  on:
    workflow_run:
      workflows: ["build"]
      types: [completed]

  jobs:
    test:
      if: github.event.workflow_run.conclusion == 'success'
      name: Testing
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os:
            - ubuntu-24.04
          python-version:
            - "3.10"
            - "3.11"
            - "3.12"
          django-version:
            - django42
            - django50

      services:
        postgres:
          image: postgres:18.3-alpine3.23
          ports:
            - 5432:5432
          options: >-
            --health-cmd="pg_isready -U postgres"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5
          env:
            POSTGRES_DB: ${{ secrets.DB_NAME }}
            POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
            POSTGRES_USER: ${{ secrets.DB_USER }}

      steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Set up Python CI
          uses: ./.github/actions/setup-python-ci
          with:
            python-version: ${{ matrix.python-version }}
            cache-suffix: ${{ matrix.django-version }}

        - name: Restore tox environment cache
          uses: ./.github/actions/cache-tox-env
          with:
            python-version: ${{ matrix.python-version }}
            django-version: ${{ matrix.django-version }}

        - name: Run Tests
          env:
            # explicitly tell `tox` which environment to execute on this runner.
            TOXENV: ${{ matrix.django-version }}

            # env variables.
            ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
            DB_ENGINE: ${{ vars.DB_ENGINE }}
            DB_HOST: ${{ vars.DB_HOST }}
            DB_PORT: ${{ vars.DB_PORT }}
            DEBUG: ${{ vars.DEBUG }}
            ENVIRONMENT: ${{ vars.ENVIRONMENT }}
            # secrets variable.
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_USER: ${{ secrets.DB_USER }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}

          # Run tox in offline mode (bypass venv creation and installation).
          run: tox run --skip-env-install --skip-missing-interpreters false -vvv
          shell: bash
