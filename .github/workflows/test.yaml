---
  name: tests
  on:
    workflow_run:
      workflows: ["build"]
      types: [completed]

  jobs:
    test:
      if: github.event.workflow_run.conclusion == 'success'
      name: Testing
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os:
            - ubuntu-latest
          python-version:
            - "3.10"
            - "3.11"
            - "3.12"
          django-version:
            - django42
            - django50

      services:
        postgres:
          image: postgres:17.5-alpine3.22
          ports:
            - 5432:5432
          options: >-
            --health-cmd="pg_isready -U postgres"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5
          env:
            POSTGRES_DB: ${{ secrets.DB_NAME }}
            POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
            POSTGRES_USER: ${{ secrets.DB_USER }}

      steps:
        - name: Checkout code
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

        - name: Set up Python CI
          uses: ./.github/actions/setup-python-ci
          with:
            python-version: ${{ matrix.python-version }}

        - name: Restore build cache
          id: cache-restore
          uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
          with:
            path: |
              .tox
            key: |
              build-${{ runner.os }}-py${{ matrix.python-version }}-${{ matrix.django-version }}-${{ hashFiles( 'requirements/base.txt', 'requirements/prod.txt', 'requirements/test-ci.txt') }}
            restore-keys: |
              build-${{ runner.os }}-py${{ matrix.python-version }}-${{ matrix.django-version }}-

        - name: Fallback - recreate environment
          if: steps.cache-restore.outputs.cache-hit != 'true'
          run: |
            echo "Cache miss detected, rebuilding tox environment..."
            tox run -e ${{ matrix.django-version }} --notest
          shell: bash

        - name: Run Tests
          env:
            # tell `tox-gh` which mapping to use from the [gh] section.
            TOX_GH_MAJOR_MINOR: ${{ matrix.python-version }}

            # env variables.
            ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
            DB_ENGINE: ${{ vars.DB_ENGINE }}
            DB_HOST: ${{ vars.DB_HOST }}
            DB_PORT: ${{ vars.DB_PORT }}
            DEBUG: ${{ vars.DEBUG }}
            ENVIRONMENT: ${{ vars.ENVIRONMENT }}
            # secrets variable.
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_USER: ${{ secrets.DB_USER }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}

          run: tox run --skip-pkg-install --skip-missing-interpreters false
          shell: bash
