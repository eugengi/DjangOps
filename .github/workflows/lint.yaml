---
  name: lint
  on:
    push:
      branches:
        - main
      paths:
        - 'src/**.py'
        - 'tests/**.py'
        - 'test_utils/**.py'
        - '.github/actions/**/*.yaml'
        - '.github/workflows/lint.yaml'
    pull_request:
      branches:
        - "**"
      paths:
        - 'src/**.py'
        - 'tests/**.py'
        - 'test_utils/**.py'
        - '.github/actions/**/*.yaml'
        - '.github/workflows/lint.yaml'

  jobs:
    lint:

      name: Linting
      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          os:
            - ubuntu-latest
          python-version:
            - "3.12"
          toxenv:
            - lint-py

      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - name: Set up Python CI
          uses: ./.github/actions/setup-python-ci
          with:
            python-version: ${{ matrix.python-version }}

        - name: Run Checks
          env:
            TOX_ENV: ${{ matrix.toxenv }}

          run: tox run
