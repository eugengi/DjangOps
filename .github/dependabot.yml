---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Africa/Nairobi"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependabot"
      - "dependencies"
      - "github-actions"
      - "upgrades"
    assignees:
      - "eugengi"
    reviewers:
      - "eugengi"
    target-branch: "main"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    ignore:
      - dependency-name: "actions/checkout"
        versions:
          - "< 6"  # Uses minimum runner requirement: `node24` runtime.
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
