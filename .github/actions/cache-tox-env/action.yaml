---
name: Cache Tox Environment
description: >
  Generates deterministic cache key and restores (or prepares to cache) the
  .tox directory. Centralizes key logic to prevent drift between build and
  downstream workflows.

inputs:
  python-version:
    description: Python version from matrix (e.g. "3.10").
    required: true
  django-version:
    description: |
      Tox Django environment name from matrix (e.g. "django42");
      See tox config file, tox.ini, at project root directory.
    required: true

outputs:
  cache-hit:
    description: |
      `true` if an exact cache key match was restored.
      `false` otherwise (including partial matches via `restore-keys`).
    value: ${{ steps.restore-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:

    # TODO(eugengi):
    # Remove after migration to use `pyproject.toml` to define dependencies.
    # `setup-uv` reads the `uv` version in `pyproject.toml`.
    - name: Read UV version from file
      id: read-uv-version
      run: |
        UV_VERSION=$(grep -E '^uv==[0-9.]+' requirements/uv.txt | cut -d '=' -f 3)
        echo "uv_version=$UV_VERSION" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Set up UV cache for tox
      uses: astral-sh/setup-uv@c893ac1cb213677f58b781341aba739a586833bf  # v6.3.1
      with:
        enable-cache: true
        cache-local-path: .cache/uv/test/tox
        cache-dependency-glob: |
          tox.ini
          **/requirements/test-ci.txt
        cache-suffix: "toxenv-${{ inputs.django-version }}"
        python-version: ${{ inputs.python-version }}
        version: "${{ steps.read-uv-version.outputs.uv_version }}"

    - name: Generate cache key
      id: cache-key
      run: |
        KEY="build-${{ runner.os }}-py${{ inputs.python-version }}-${{ inputs.django-version }}-${{ hashFiles( 'tox.ini', 'requirements/test-ci.txt' ) }}"
        echo "key=${KEY}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Restore or cache tox environment
      id: restore-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          .tox
        key: ${{ steps.cache-key.outputs.key }}
