fail_fast: false
exclude: migrations/
default_language_version:
    python: python3.12

ci:
    autofix_commit_msg: |
        style(pre-commit.ci): Patch auto-fixes from hooks
        for more information, see https://pre-commit.ci
    autofix_prs: true
    autoupdate_branch: ''
    autoupdate_commit_msg: 'chore(pre-commit.ci): Upgrade hook versions'
    autoupdate_schedule: weekly
    skip: [renovate-config-validator]
    submodules: false

repos:
  # Best Practices
  -   repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
      -   id: check-builtin-literals
      -   id: check-executables-have-shebangs
      -   id: check-json
      -   id: check-symlinks
      -   id: check-yaml
          exclude: ^(compose\.prod\.yaml|compose\.develop\.yaml|compose\.testing\.yaml)$
      -   id: debug-statements
      -   id: detect-private-key
      -   id: end-of-file-fixer
      -   id: name-tests-test
          args: [--pytest-test-first]
      -   id: trailing-whitespace
          args: [--markdown-linebreak-ext=md]

  # Framework
  -   repo: https://github.com/adamchainz/django-upgrade
      rev: 1.30.0
      hooks:
      -   id: django-upgrade
          args: [--target-version, "4.2"]

  # Formatting
  -   repo: https://github.com/psf/black-pre-commit-mirror
      rev: 26.5.1
      hooks:
      -   id: black

  -   repo: https://github.com/PyCQA/isort
      rev: 9.0.0a3
      hooks:
      -   id: isort
          args: [
            '--settings-path', 'pyproject.toml',
            '/src',
            '/tests',
            '/test_utils',
          ]

  -   repo: https://github.com/maxwinterstein/shfmt-py
      rev: v4.0.0
      hooks:
      -   id: shfmt

  # Linting
  -   repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.15
      hooks:
      -   id: ruff-check
          args: [--fix]
          exclude: ^(test_utils/|migrations/|setup\.py)$

  -   repo: https://github.com/AleksaC/hadolint-py
      rev: v2.14.0
      hooks:
      -   id: hadolint
          args: [--config, .hadolint.yaml]

  -   repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.11.0.1
      hooks:
      -   id: shellcheck

  # Code Quality
  -   repo: https://github.com/pre-commit/mirrors-mypy
      rev: v2.1.0
      hooks:
      -   id: mypy
          args: [--config-file, pyproject.toml, --warn-unused-configs]

  # Security
  -   repo: https://github.com/PyCQA/bandit
      rev: 1.9.4
      hooks:
      -   id: bandit
          args: [-c, pyproject.toml, -r]
          additional_dependencies: ["bandit[toml]"]

  # Documentation, Spelling
  -   repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
      rev: v9.25.0
      hooks:
      -   id: commitlint
          stages: [commit-msg]
          additional_dependencies: ['@commitlint/config-conventional']

  -   repo: https://github.com/igorshubovych/markdownlint-cli
      rev: 'v0.48.0'
      hooks:
      -   id: markdownlint
          args: ['-f']

  -   repo: https://github.com/codespell-project/codespell
      rev: v2.4.2
      hooks:
      -   id: codespell
          files: \.(py|sh|md|rst|yml|yaml)$

  # Package manager, Dependencies
  -   repo: https://github.com/astral-sh/uv-pre-commit
      rev: 0.11.18
      hooks:
      # Warn if uv lockfile is not up-to-date.
      -   id: uv-lock
          args: ['--check']

  # Config file validators
  -   repo: https://github.com/renovatebot/pre-commit-hooks
      rev: 43.216.1
      hooks:
      -   id: renovate-config-validator
          args: [--strict]
